version: '3.8'

services:
  app:
    build: .
    image: unet-iris:latest
    shm_size: '2gb'
    ports:
      - "8001:8001"
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    mem_limit: 6g
    mem_reservation: 2g

# If you need mongo, you can uncomment the block below. main.py currently
# does not use MongoDB, so it's omitted by default.
#
#  mongo:
#    image: mongo:6.0
#    ports:
#      - "27017:27017"
#    volumes:
#      - mongo_data:/data/db

volumes: {}